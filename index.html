<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin:0; overflow:hidden;">
    <div id="start-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); color:#D4AF37; z-index:9999; display:flex; align-items:center; justify-content:center; font-size:20px; font-family:sans-serif; text-align:center; cursor:pointer; padding:20px;">
        MAGTAL: TAPNI ZA START <br> (I UPERI U SLIKU)
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; displayWidth: 1280; displayHeight: 720; canvasWidth: 1280; canvasHeight: 720;">
        
        <a-assets>
            <audio id="t1" src="vocal.mp3" preload="auto"></audio>
            <audio id="t2" src="bass.mp3" preload="auto"></audio>
            <audio id="t3" src="drum.mp3" preload="auto"></audio>
            <audio id="t4" src="other.mp3" preload="auto"></audio>
        </a-assets>

        <a-marker type="pattern" url="pattern-marker.patt" id="eva-marker">
            <a-box position="0 0.5 0" material="color: #D4AF37; opacity: 0.5;" animation="property: rotation; to: 0 360 0; loop: true; dur: 4000"></a-box>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const marker = document.querySelector('#eva-marker');
        const tracks = [document.getElementById('t1'), document.getElementById('t2'), document.getElementById('t3'), document.getElementById('t4')];
        let unlocked = false;

        document.getElementById('start-overlay').addEventListener('click', function() {
            unlocked = true;
            this.style.display = 'none';
            // Inicijalni "tihi" play da se odobri audio context
            tracks.forEach(t => { t.play(); t.pause(); });
        });

        marker.addEventListener('markerFound', () => {
            if(unlocked) {
                tracks.forEach(t => {
                    t.muted = false;
                    t.play();
                });
            }
        });

        marker.addEventListener('markerLost', () => {
            tracks.forEach(t => t.pause());
        });
    </script>
</body>
</html>
