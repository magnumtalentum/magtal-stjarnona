<!DOCTYPE html>
<html>
<head>
    <title>MAGTAL AR - CENTER FIX</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        #arjs-video {
            width: 100vw !important;
            height: 100vh !important;
            object-fit: cover !important;
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
        }
    </style>
</head>
<body style="margin: 0px; overflow: hidden;">
    <a-scene 
        embedded 
        vr-mode-ui="enabled: false"
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono; trackingMethod: best;"
        renderer="logarithmicDepthBuffer: true;">

        <a-marker 
            type="pattern" 
            url="pattern-marker.patt"
            smooth="true"
            smoothCount="10"
            smoothTolerance="0.01"
            smoothThreshold="5">
            
            <a-text 
                value="MAGNUM TALENTUM" 
                align="center" 
                color="#D4AF37" 
                position="0 0 0" 
                rotation="-90 0 0" 
                width="5">
            </a-text>

            <a-entity id="vocal" sound="src: url(vocal.mp3); loop: true; autoplay: false"></a-entity>
            <a-entity id="bass" sound="src: url(bass.mp3); loop: true; autoplay: false"></a-entity>
            <a-entity id="drum" sound="src: url(drum.mp3); loop: true; autoplay: false"></a-entity>
            <a-entity id="other" sound="src: url(other.mp3); loop: true; autoplay: false"></a-entity>
            
        </a-marker>

        <a-entity camera="fov: 80"></a-entity>
    </a-scene>

    <script>
        const marker = document.querySelector('a-marker');
        const sounds = document.querySelectorAll('[sound]');

        marker.addEventListener('markerFound', () => {
            sounds.forEach(s => {
                if(s.components.sound) s.components.sound.playSound();
            });
        });

        marker.addEventListener('markerLost', () => {
            sounds.forEach(s => {
                if(s.components.sound) s.components.sound.pauseSound();
            });
        });

        window.addEventListener('click', () => {
            sounds.forEach(s => {
                const ctx = s.components.sound.audioContext;
                if (ctx && ctx.state === 'suspended') ctx.resume();
            });
        }, { once: true });
    </script>
</body>
</html>
