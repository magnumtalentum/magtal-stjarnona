<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>MAGTAL_L3_PROT_V1</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/three.js/build/ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden; background-color: #000;">

<script>
    /** * INITIALIZATION: L3 Resource Control
     */
    const scene = new THREE.Scene();
    const camera = new THREE.Camera();
    scene.add(camera);

    const renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: true,
        precision: 'highp' // Forsiranje visoke preciznosti rendera
    });
    
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.domElement.style.position = 'absolute';
    renderer.domElement.style.top = '0px';
    renderer.domElement.style.left = '0px';
    document.body.appendChild(renderer.domElement);

    /**
     * AR TOOLKIT: Direct Camera Pipe (No Zoom)
     */
    const arToolkitSource = new THREEx.ArToolkitSource({
        sourceType: 'webcam',
        sourceWidth: 1280,
        sourceHeight: 720,
        displayWidth: 1280,
        displayHeight: 720,
    });

    arToolkitSource.init(() => {
        setTimeout(onResize, 500);
    });

    window.addEventListener('resize', onResize);
    function onResize() {
        arToolkitSource.onResizeElement();
        arToolkitSource.copyElementSizeTo(renderer.domElement);
        if (arToolkitContext.arController !== null) {
            arToolkitSource.copyElementSizeTo(arToolkitContext.arController.canvas);
        }
    }

    /**
     * AR CONTEXT: Matrix & Axis Fix
     */
    const arToolkitContext = new THREEx.ArToolkitContext({
        cameraParametersUrl: 'https://raw.githack.com/AR-js-org/AR.js/master/data/data/camera_para.dat',
        detectionMode: 'mono',
        imageSmoothingEnabled: true,
        maxDetectionRate: 60, // L3 standard za fluidnost
        canvasWidth: 1280,
        canvasHeight: 720,
    });

    arToolkitContext.init(() => {
        camera.projectionMatrix.copy(arToolkitContext.getProjectionMatrix());
    });

    /**
     * MARKER & ASSETS: Coordinate Lock
     */
    const markerRoot = new THREE.Group();
    scene.add(markerRoot);

    new THREEx.ArMarkerControls(arToolkitContext, markerRoot, {
        type: 'pattern',
        patternUrl: 'pattern-marker.patt', // Tvoj .patt fajl
    });

    // Audio Assets
    const audioFiles = ['vocal.mp3', 'bass.mp3', 'drum.mp3', 'other.mp3'];
    const stems = audioFiles.map(src => {
        const a = new Audio(src);
        a.loop = true;
        a.preload = 'auto';
        return a;
    });

    /**
     * EXECUTION: Logical Triggering
     */
    let isTracking = false;
    let audioContextUnlocked = false;

    // Handshake za mobilne browsere
    window.addEventListener('touchstart', () => {
        if (!audioContextUnlocked) {
            stems.forEach(s => { s.play(); s.pause(); });
            audioContextUnlocked = true;
        }
    }, { once: true });

    function update() {
        if (arToolkitSource.ready === false) return;
        arToolkitContext.update(arToolkitSource.domElement);

        if (markerRoot.visible) {
            if (!isTracking) {
                stems.forEach(s => s.play());
                isTracking = true;
            }
        } else {
            if (isTracking) {
                stems.forEach(s => s.pause());
                isTracking = false;
            }
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        update();
        renderer.render(scene, camera);
    }

    animate();
</script>
</body>
</html>
