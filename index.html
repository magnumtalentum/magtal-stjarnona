<!DOCTYPE html>
<html>
<head>
    <title>MAGTAL Dev Lab - STJARNONA AR</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        #arjs-video {
            width: 100vw !important;
            height: 100vh !important;
            margin-left: 0px !important;
            object-fit: cover !important;
        }
    </style>
</head>
<body style="margin: 0px; overflow: hidden;">
    <a-scene 
        embedded 
        vr-mode-ui="enabled: false"
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; trackingMethod: best; sourceWidth:1280; sourceHeight:720; displayWidth:1280; displayHeight:720;">

        <a-marker 
            type="pattern" 
            url="pattern-marker.patt"
            smooth="true"
            smoothCount="10"
            smoothTolerance="0.01"
            smoothThreshold="5">
            
            <a-text 
                value="MAGNUM TALENTUM" 
                align="center" 
                color="#D4AF37" 
                position="0 0.2 0" 
                rotation="-90 0 0" 
                width="5">
            </a-text>

            <a-entity id="vocal" sound="src: url(vocal.mp3); loop: true; autoplay: false; volume: 1"></a-entity>
            <a-entity id="bass" sound="src: url(bass.mp3); loop: true; autoplay: false; volume: 1"></a-entity>
            <a-entity id="drum" sound="src: url(drum.mp3); loop: true; autoplay: false; volume: 1"></a-entity>
            <a-entity id="other" sound="src: url(other.mp3); loop: true; autoplay: false; volume: 1"></a-entity>
            
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const marker = document.querySelector('a-marker');
        const sounds = document.querySelectorAll('[sound]');

        // Pokretanje zvuka samo kada je marker u fokusu
        marker.addEventListener('markerFound', () => {
            sounds.forEach(s => {
                if(s.components.sound) {
                    s.components.sound.playSound();
                }
            });
        });

        // Pauziranje zvuka kada se marker izgubi
        marker.addEventListener('markerLost', () => {
            sounds.forEach(s => {
                if(s.components.sound) {
                    s.components.sound.pauseSound();
                }
            });
        });

        // Unlock audio context na prvi klik (obavezno za mobilne browsere)
        window.addEventListener('click', () => {
            sounds.forEach(s => {
                const ctx = s.components.sound.audioContext;
                if (ctx && ctx.state === 'suspended') {
                    ctx.resume();
                }
            });
        }, { once: true });
    </script>
</body>
</html>
