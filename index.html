<!DOCTYPE html>
<html>
<head>
    <title>MAGTAL Dev Lab - STJARNONA AR</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0px; overflow: hidden;">
    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; sourceWidth:1280; sourceHeight:720; displayWidth:1280; displayHeight:720;"
        vr-mode-ui="enabled: false">

        <a-marker type="pattern" url="pattern-marker.patt">
            <a-text 
                value="MAGNUM TALENTUM\nSTJARNONA AR ARCHIVE" 
                align="center" 
                color="#D4AF37" 
                position="0 0.5 0" 
                rotation="-90 0 0" 
                width="4">
            </a-text>

            <a-entity sound="src: url(vocal.mp3); autoplay: false; loop: true; volume: 1" class="audio-track"></a-entity>
            <a-entity sound="src: url(bass.mp3); autoplay: false; loop: true; volume: 1" class="audio-track"></a-entity>
            <a-entity sound="src: url(drum.mp3); autoplay: false; loop: true; volume: 1" class="audio-track"></a-entity>
            <a-entity sound="src: url(other.mp3); autoplay: false; loop: true; volume: 1" class="audio-track"></a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // Logika za aktivaciju zvuka pri detekciji markera
        const marker = document.querySelector('a-marker');
        const audioTracks = document.querySelectorAll('.audio-track');

        marker.addEventListener('markerFound', () => {
            audioTracks.forEach(track => {
                track.components.sound.playSound();
            });
        });

        marker.addEventListener('markerLost', () => {
            audioTracks.forEach(track => {
                track.components.sound.pauseSound();
            });
        });

        // "Unlock" za audio na mobilnim browserima
        window.addEventListener('touchstart', function() {
            audioTracks.forEach(track => {
                if (track.components.sound && !track.components.sound.isPlaying) {
                    // Samo inicijalizujemo zvukove, pustice ih markerFound
                }
            });
        }, { once: true });
    </script>
</body>
</html>
