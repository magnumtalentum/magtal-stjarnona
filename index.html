<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MAGTAL Dev Lab - FINAL AR</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0px; overflow: hidden;">

    <a-scene 
        embedded 
        renderer="logarithmicDepthBuffer: true; antialias: true;"
        vr-mode-ui="enabled: false"
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3; trackingMethod: best;">

        <a-marker 
            type="pattern" 
            url="pattern-marker.patt"
            smooth="true"
            smoothCount="10"
            smoothTolerance="0.01"
            smoothThreshold="5">
            
            <a-text 
                value="MAGNUM TALENTUM\nSTJARNONA AR ARCHIVE" 
                align="center" 
                color="#D4AF37" 
                position="0 0.1 0" 
                rotation="-90 0 0" 
                width="4">
            </a-text>

            <a-entity id="v1" sound="src: url(vocal.mp3); loop: true; autoplay: false"></a-entity>
            <a-entity id="v2" sound="src: url(bass.mp3); loop: true; autoplay: false"></a-entity>
            <a-entity id="v3" sound="src: url(drum.mp3); loop: true; autoplay: false"></a-entity>
            <a-entity id="v4" sound="src: url(other.mp3); loop: true; autoplay: false"></a-entity>
            
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const marker = document.querySelector('a-marker');
        const sounds = document.querySelectorAll('[sound]');

        // Glavna funkcija za zvuk
        marker.addEventListener('markerFound', () => {
            sounds.forEach(s => {
                if (s.components.sound) {
                    s.components.sound.playSound();
                }
            });
        });

        marker.addEventListener('markerLost', () => {
            sounds.forEach(s => {
                if (s.components.sound) {
                    s.components.sound.pauseSound();
                }
            });
        });

        // Force-fix za Android Chrome zoom i osu
        window.addEventListener('resize', () => {
            const scene = document.querySelector('a-scene');
            if (scene && scene.systems.arjs) {
                scene.systems.arjs.onResize();
            }
        });

        // Jednokratni klik za aktivaciju audia
        window.addEventListener('click', () => {
            sounds.forEach(s => {
                const ctx = s.components.sound.audioContext;
                if (ctx && ctx.state === 'suspended') {
                    ctx.resume();
                }
            });
        }, { once: true });
    </script>
</body>
</html>
