<!DOCTYPE html>
<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
<script src="https://raw.githack.com/AR-js-org/AR.js/master/three.js/build/ar.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<body style="margin: 0px; overflow: hidden; font-family: sans-serif;">
    <div id="instruction" style="position: fixed; top: 10px; width: 100%; text-align: center; color: white; z-index: 10; background: rgba(0,0,0,0.5);">
        Tapni ekran za zvuk & uperi u marker
    </div>

    <script>
        // Inicijalizacija scene
        const scene = new THREE.Scene();
        const camera = new THREE.Camera();
        scene.add(camera);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Setup AR.js
        const arToolkitSource = new THREEx.ArToolkitSource({ sourceType: 'webcam' });
        arToolkitSource.init(() => {
            setTimeout(() => { onResize(); }, 2000);
        });

        window.addEventListener('resize', () => { onResize(); });
        function onResize() {
            arToolkitSource.onResizeElement();
            arToolkitSource.copyElementSizeTo(renderer.domElement);
            if (arToolkitContext.arController !== null) {
                arToolkitSource.copyElementSizeTo(arToolkitContext.arController.canvas);
            }
        }

        const arToolkitContext = new THREEx.ArToolkitContext({
            cameraParametersUrl: 'https://raw.githack.com/AR-js-org/AR.js/master/data/data/camera_para.dat',
            detectionMode: 'mono'
        });
        arToolkitContext.init(() => {
            camera.projectionMatrix.copy(arToolkitContext.getProjectionMatrix());
        });

        // Marker setup
        const markerRoot = new THREE.Group();
        scene.add(markerRoot);
        const markerControls = new THREEx.ArMarkerControls(arToolkitContext, markerRoot, {
            type: 'pattern', patternUrl: 'pattern-marker.patt',
        });

        // Audio setup
        const audioFiles = ['vocal.mp3', 'bass.mp3', 'drum.mp3', 'other.mp3'];
        const sounds = audioFiles.map(file => {
            const audio = new Audio(file);
            audio.loop = true;
            return audio;
        });

        // Audio kontrola
        let isPlaying = false;
        window.addEventListener('click', () => {
            sounds.forEach(s => s.play().then(() => s.pause())); // Unlock
            document.getElementById('instruction').style.display = 'none';
        }, { once: true });

        function update() {
            if (arToolkitSource.ready === false) return;
            arToolkitContext.update(arToolkitSource.domElement);
            
            if (markerRoot.visible) {
                if (!isPlaying) {
                    sounds.forEach(s => s.play());
                    isPlaying = true;
                }
            } else {
                if (isPlaying) {
                    sounds.forEach(s => s.pause());
                    isPlaying = false;
                }
            }
        }

        function render() {
            renderer.render(scene, camera);
        }

        function animate() {
            requestAnimationFrame(animate);
            update();
            render();
        }
        animate();
    </script>
</body>
</html>
