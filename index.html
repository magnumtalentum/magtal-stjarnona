<!DOCTYPE html>
<html>
<head>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin:0; overflow:hidden;">
    <div id="start-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); color:gold; z-index:9999; display:flex; align-items:center; justify-content:center; font-size:24px; cursor:pointer;">
        TAPNI DA OTKLJUČAŠ ZVUK (A ZATIM UPERI U SLIKU)
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-assets>
            <audio id="track1" src="vocal.mp3" preload="auto"></audio>
            <audio id="track2" src="bass.mp3" preload="auto"></audio>
            <audio id="track3" src="drum.mp3" preload="auto"></audio>
            <audio id="track4" src="other.mp3" preload="auto"></audio>
        </a-assets>

        <a-marker type="pattern" url="pattern-marker.patt" id="eva-marker">
            <a-box position="0 0.5 0" material="color: gold; opacity: 0.5;"></a-box>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const marker = document.querySelector('#eva-marker');
        const tracks = ['track1', 'track2', 'track3', 'track4'].map(id => document.getElementById(id));
        let audioContextUnlocked = false;

        // 1. Prvi klik samo dozvoljava audio sistemu da radi
        document.getElementById('start-overlay').addEventListener('click', function() {
            audioContextUnlocked = true;
            this.style.display = 'none';
        });

        // 2. Kada marker uđe u kadar (UPERIŠ U SLIKU), pesma kreće
        marker.addEventListener('markerFound', () => {
            if(audioContextUnlocked) {
                tracks.forEach(t => {
                    t.currentTime = 0; // Krece ispocetka kad vidi sliku
                    t.play();
                });
            }
        });

        // 3. Kada skloniš telefon sa slike, pesma staje
        marker.addEventListener('markerLost', () => {
            tracks.forEach(t => t.pause());
        });
    </script>
</body>
</html>
