<!DOCTYPE html>
<html>
<head>
    <title>MAGTAL AR</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        /* Ovaj deo sprečava ludi zoom na Androidu */
        #arjs-video {
            width: 100vw !important;
            height: 100vh !important;
            margin-left: 0px !important;
            object-fit: cover !important;
        }
    </style>
</head>
<body style="margin: 0px; overflow: hidden;">
    <a-scene 
        embedded 
        vr-mode-ui="enabled: false"
        arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;">

        <a-marker type="pattern" url="pattern-marker.patt">
            <a-text 
                value="MAGNUM TALENTUM" 
                align="center" 
                color="#D4AF37" 
                position="0 0.5 0" 
                rotation="-90 0 0" 
                width="6">
            </a-text>

            <a-entity id="vocal" sound="src: url(vocal.mp3); loop: true"></a-entity>
            <a-entity id="bass" sound="src: url(bass.mp3); loop: true"></a-entity>
            <a-entity id="drum" sound="src: url(drum.mp3); loop: true"></a-entity>
            <a-entity id="other" sound="src: url(other.mp3); loop: true"></a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const marker = document.querySelector('a-marker');
        const sounds = document.querySelectorAll('[sound]');

        marker.addEventListener('markerFound', () => {
            sounds.forEach(s => s.components.sound.playSound());
        });

        marker.addEventListener('markerLost', () => {
            sounds.forEach(s => s.components.sound.pauseSound());
        });

        // "Unlock" na prvi dodir bilo gde
        window.addEventListener('click', () => {
            sounds.forEach(s => {
                const ctx = s.components.sound.audioContext;
                if (ctx && ctx.state === 'suspended') ctx.resume();
            });
        }, { once: true });
    </script>
</body>
</html>
