<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAGTAL AR - Loretta Rinn</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        #ar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center; cursor: pointer;
        }
        .start-btn {
            padding: 20px 40px; font-size: 24px; background: #D4AF37; border: none;
            color: black; font-weight: bold; border-radius: 50px; margin-top: 20px;
        }
    </style>
</head>
<body style="margin: 0px; overflow: hidden;">

    <div id="ar-overlay">
        <h1>MAGTAL DEV LAB</h1>
        <p>Spremno za interakciju</p>
        <button class="start-btn">AKTIVIRAJ AR & ZVUK</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;">
        
        <a-assets>
            <audio id="vocal" src="vocal.mp3" preload="auto"></audio>
            <audio id="bass" src="bass.mp3" preload="auto"></audio>
            <audio id="drum" src="drum.mp3" preload="auto"></audio>
            <audio id="other" src="other.mp3" preload="auto"></audio>
        </a-assets>

        <a-marker type="pattern" url="pattern-marker.patt">
            <a-box position="0 0.5 0" material="color: #D4AF37; opacity: 0.6;" animation="property: rotation; to: 0 360 0; loop: true; dur: 5000"></a-box>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const overlay = document.getElementById('ar-overlay');
        const audioIds = ['vocal', 'bass', 'drum', 'other'];
        const audios = audioIds.map(id => document.getElementById(id));

        overlay.addEventListener('click', () => {
            // Unmute i pokretanje svih audio fajlova odjednom
            audios.forEach(audio => {
                audio.play();
                // Ako želimo da zvuk krene tek kad se vidi marker, ovde bismo stavili pause, 
                // ali za ovaj test puštamo sve odmah da potvrdimo prohodnost.
            });
            overlay.style.display = 'none';
            console.log("L3 Protokol: Audio aktiviran.");
        });
    </script>
</body>
</html>
