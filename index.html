<!DOCTYPE html>
<html>
<head>
    <title>MAGTAL Dev Lab - STJARNONA AR</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0px; overflow: hidden;">

    <a-scene 
        embedded 
        vr-mode-ui="enabled: false"
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; trackingMethod: best;">

        <a-marker type="pattern" url="pattern-marker.patt">
            
            <a-text 
                value="MAGNUM TALENTUM\nSTJARNONA AR ARCHIVE" 
                align="center" 
                color="#D4AF37" 
                position="0 0.5 0" 
                rotation="-90 0 0" 
                width="4"
                font="https://cdn.aframe.io/fonts/Exo2Bold.fnt">
            </a-text>

            <a-entity id="track1" sound="src: url(vocal.mp3); autoplay: false; loop: true; volume: 1"></a-entity>
            <a-entity id="track2" sound="src: url(bass.mp3); autoplay: false; loop: true; volume: 1"></a-entity>
            <a-entity id="track3" sound="src: url(drum.mp3); autoplay: false; loop: true; volume: 1"></a-entity>
            <a-entity id="track4" sound="src: url(other.mp3); autoplay: false; loop: true; volume: 1"></a-entity>
            
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const marker = document.querySelector('a-marker');
        // Selektujemo sve entitete koji imaju sound komponentu
        const sounds = document.querySelectorAll('[sound]');

        // Funkcija koja pušta sve zvukove sinhronizovano
        marker.addEventListener('markerFound', () => {
            sounds.forEach(s => {
                if(s.components.sound) {
                    s.components.sound.playSound();
                }
            });
        });

        // Funkcija koja pauzira sve zvukove kada se marker izgubi
        marker.addEventListener('markerLost', () => {
            sounds.forEach(s => {
                if(s.components.sound) {
                    s.components.sound.pauseSound();
                }
            });
        });

        // "Magični" klik za otključavanje audia na mobilnim telefonima
        window.addEventListener('click', () => {
            sounds.forEach(s => {
                if (s.components.sound && s.components.sound.audioContext) {
                    if (s.components.sound.audioContext.state === 'suspended') {
                        s.components.sound.audioContext.resume();
                    }
                }
            });
        }, { once: true });
    </script>
</body>
</html>
