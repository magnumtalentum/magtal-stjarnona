<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MAGTAL_TEST | AR Golden Cube + 4 Audio</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #unlock-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }
        .unlock-text {
            background: #D4AF37;
            color: #1e1e1e;
            padding: 18px 36px;
            border-radius: 60px;
            font-size: 1.4rem;
            font-weight: bold;
            text-align: center;
        }
        .hint {
            color: #ffd966;
            margin-top: 20px;
            font-size: 14px;
        }
    </style>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ar.js@2.2.2/aframe/build/aframe-ar.min.js"></script>
</head>
<body>

    <!-- Overlay za otključavanje audio (Chrome autoplay) -->
    <div id="unlock-overlay">
        <div class="unlock-text">🔊 TAP TO ENABLE SOUND & CAMERA 🔊</div>
        <div class="hint">🎯 Nakon toga uperi kameru u marker "pattern-marker.patt"</div>
    </div>

    <!-- Audio elementi (preload) -->
    <audio id="sound-vocal" src="vocal.mp3" preload="auto"></audio>
    <audio id="sound-bass" src="bass.mp3" preload="auto"></audio>
    <audio id="sound-drum" src="drum.mp3" preload="auto"></audio>
    <audio id="sound-other" src="other.mp3" preload="auto"></audio>

    <!-- AR scena sa fiksnim zoomom i rezolucijom -->
    <a-scene
        id="ar-scene"
        embedded
        arjs="
            sourceType: webcam;
            debugUIEnabled: false;
            detectionMode: mono_and_matrix;
            matrixCodeType: 3x3;
            cameraParametersUrl: false;
            sourceWidth: 1280;
            sourceHeight: 720;
            displayWidth: 1280;
            displayHeight: 720;
            videoConstraints: {
                width: { exact: 1280 },
                height: { exact: 720 },
                facingMode: 'environment',
                zoom: 1.0
            };
        "
        vr-mode-ui="enabled: false"
        renderer="antialias: true"
    >
        <!-- Kamera sa dodatnim zabranama zumiranja -->
        <a-camera id="ar-camera" active="true" user-height="1.6" position="0 0 0">
            <!-- Onemogući pinch-to-zoom preko JavaScripta -->
        </a-camera>

        <!-- Custom marker (pattern-marker.patt) -->
        <a-marker
            id="golden-marker"
            type="pattern"
            url="pattern-marker.patt"
            raftexposure="true"
            raftexposure-threshold="0.6"
            patternRatio="0.8"
        >
            <!-- Zlatna poluprovidna kocka sa rotacijom -->
            <a-box
                position="0 0.6 0"
                material="color: #D4AF37; opacity: 0.65; metalness: 0.8; roughness: 0.2; transparent: true"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 6000; easing: linear"
            ></a-box>
        </a-marker>

        <!-- Ambientno svjetlo -->
        <a-light type="ambient" intensity="0.6" color="#FFF5E0"></a-light>
        <a-light type="directional" position="1 2 1" intensity="1.2" color="#FFE4A0"></a-light>
    </a-scene>

    <script>
        (function() {
            const vocal = document.getElementById('sound-vocal');
            const bass = document.getElementById('sound-bass');
            const drum = document.getElementById('sound-drum');
            const other = document.getElementById('sound-other');
            const allAudios = [vocal, bass, drum, other];

            let audioUnlocked = false;
            let markerVisible = false;
            let resetOnNextPlay = false;

            // Overlay
            const overlay = document.getElementById('unlock-overlay');

            // Funkcija za istovremeno puštanje svih audio zapisa
            async function playAllAudios(resetToZero = false) {
                if (!audioUnlocked || !markerVisible) return false;
                try {
                    if (resetToZero) {
                        allAudios.forEach(a => { a.currentTime = 0; });
                    }
                    await Promise.all(allAudios.map(a => a.play()));
                    return true;
                } catch(e) {
                    console.warn("Audio play greška:", e);
                    if (e.name === 'NotAllowedError') {
                        audioUnlocked = false;
                        overlay.style.display = 'flex';
                    }
                    return false;
                }
            }

            function pauseAllAudios() {
                allAudios.forEach(a => { if (!a.paused) a.pause(); });
            }

            // Kada se marker pronađe
            const marker = document.getElementById('golden-marker');
            if (marker) {
                marker.addEventListener('markerFound', () => {
                    console.log('✅ Marker detektovan');
                    markerVisible = true;
                    if (!audioUnlocked) {
                        // Čekamo da korisnik otključa
                        return;
                    }
                    // Ako je neki audio završio ili je sve pauzirano, resetuj na 0
                    const anyPlaying = allAudios.some(a => !a.paused);
                    const anyEnded = allAudios.some(a => a.currentTime >= a.duration - 0.05);
                    if (!anyPlaying || anyEnded || resetOnNextPlay) {
                        playAllAudios(true);
                        resetOnNextPlay = false;
                    } else {
                        playAllAudios(false);
                    }
                });

                marker.addEventListener('markerLost', () => {
                    console.log('❌ Marker izgubljen');
                    markerVisible = false;
                    pauseAllAudios();
                });
            }

            // Kad bilo koji audio dođe do kraja, resetuj sve na nulu i restartuj (ako je marker i dalje vidljiv)
            function setupLoopHandler() {
                let restartScheduled = false;
                allAudios.forEach(audio => {
                    audio.addEventListener('ended', () => {
                        if (markerVisible && audioUnlocked && !restartScheduled) {
                            restartScheduled = true;
                            setTimeout(() => {
                                if (markerVisible && audioUnlocked) {
                                    playAllAudios(true);
                                }
                                restartScheduled = false;
                            }, 50);
                        }
                    });
                });
            }
            setupLoopHandler();

            // Otključavanje audio na korisnikov tap
            function unlockAndStart() {
                if (audioUnlocked) return;
                audioUnlocked = true;
                resetOnNextPlay = true;
                overlay.style.display = 'none';

                // "Null" play da aktivira audio context
                allAudios.forEach(a => { a.load(); a.volume = 1.0; a.play().then(() => a.pause()).catch(e=>{}); });

                // Ako je marker već vidljiv (što nije vjerovatno prije otključavanja), pokreni zvuk
                if (markerVisible) {
                    playAllAudios(true);
                }
            }

            overlay.addEventListener('click', unlockAndStart);
            // Dodatno: tap bilo gdje (sigurnosno)
            document.body.addEventListener('touchstart', unlockAndStart, { once: true });
            document.body.addEventListener('click', unlockAndStart, { once: true });

            // ---- PRISILNO POPRAVI KAMERU (ZOOM = 1.0) ----
            // Nakon što se scena učita, primijeni dodatna ograničenja na video track
            const scene = document.querySelector('a-scene');
            scene.addEventListener('renderstart', async () => {
                console.log('AR scena spremna, popravljam zoom kamere...');
                // Pokušaj dohvatiti video element iz AR.js sistema
                let video = null;
                const arSystem = scene.systems['arjs'];
                if (arSystem && arSystem.controls && arSystem.controls._videoElement) {
                    video = arSystem.controls._videoElement;
                } else {
                    // Fallback: potraži video element
                    video = document.querySelector('video');
                }
                if (video && video.srcObject) {
                    const track = video.srcObject.getVideoTracks()[0];
                    if (track && track.applyConstraints) {
                        try {
                            await track.applyConstraints({
                                width: { exact: 1280 },
                                height: { exact: 720 },
                                advanced: [{ zoom: 1.0 }]
                            });
                            console.log('✅ Zoom postavljen na 1.0, rezolucija 1280x720');
                        } catch(err) {
                            console.warn('Nije moguće primijeniti zoom constraints:', err);
                        }
                    }
                }
                // Onemogući pinch-to-zoom na canvasu
                const canvas = document.querySelector('canvas');
                if (canvas) {
                    canvas.addEventListener('touchmove', (e) => {
                        if (e.touches.length >= 2) e.preventDefault();
                    }, { passive: false });
                }
            });
        })();
    </script>
</body>
</html>
